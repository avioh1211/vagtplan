<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vagtplan 2026 - Live Sync</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --ink:       #1a1a1a;
            --cream:     #FFF9F2;
            --lavender:  #C8B4E8;
            --lav-dark:  #9B7FCC;
            --sky:       #A8CCEA;
            --sky-dark:  #6FA8CC;
            --peach:     #F5D5A8;
            --peach-dark:#D4A870;
            --lime:      #C8E8A0;
            --lime-dark: #85BB45;
            --holbg:     #D4C4F0;
            --today-glow:#7B4FD4;
            --absent-bg: #FFF0F0;
            --absent-red: #E05050;
            --display:   'Bebas Neue', Impact, 'Arial Black', sans-serif;
            --mono:      'DM Mono', 'Courier New', monospace;
        }

        * { margin:0; padding:0; box-sizing:border-box; }
        html, body { width:100%; background:var(--cream); font-family:var(--mono); overflow-x:hidden; }

        /* MASTHEAD */
        .masthead { background:var(--lavender); border-bottom:4px solid var(--ink); display:grid; grid-template-columns:1fr auto; align-items:stretch; }
        .mt { padding:1.2rem 1.8rem; }
        .mt h1 { font-family:var(--display); font-size:clamp(2.8rem,7vw,5.5rem); color:var(--ink); letter-spacing:0.03em; line-height:0.9; }
        .mt h1 span { color:var(--lav-dark); }
        .mt-sub { font-size:0.58rem; color:var(--ink); letter-spacing:0.18em; text-transform:uppercase; margin-top:0.5rem; opacity:0.6; }
        
        .mt-today { background:var(--today-glow); border-left:4px solid var(--ink); padding:1rem 1.6rem; display:flex; flex-direction:column; justify-content:center; align-items:center; min-width:160px; position:relative; overflow:hidden; }
        .mt-today::before { content:''; position:absolute; inset:0; background:repeating-linear-gradient(45deg,transparent,transparent 8px,rgba(255,255,255,0.07) 8px,rgba(255,255,255,0.07) 16px); }
        .mt-today .today-label { font-size:0.5rem; font-weight:700; letter-spacing:0.2em; color:rgba(255,255,255,0.7); text-transform:uppercase; margin-bottom:0.3rem; position:relative; }
        .mt-today .tday { font-family:var(--display); font-size:2.2rem; letter-spacing:0.05em; color:white; position:relative; }
        .mt-today .tdate { font-size:0.65rem; font-weight:700; letter-spacing:0.12em; color:white; margin-top:0.25rem; opacity:0.85; position:relative; }

        /* CONTROLS */
        .controls { background:var(--cream); border-bottom:4px solid var(--ink); display:flex; flex-wrap:wrap; align-items:center; padding:0.7rem 1.5rem; gap:0.5rem; }
        .controls-label { font-size:0.5rem; letter-spacing:0.18em; text-transform:uppercase; opacity:0.45; margin-right:0.2rem; }
        .abtn { font-family:var(--display); font-size:1.15rem; letter-spacing:0.08em; padding:0.3rem 1.2rem; border:3px solid var(--ink); border-radius:40px; cursor:pointer; background:transparent; color:var(--ink); transition:all 0.15s; }
        .abtn:hover { opacity:0.75; }
        .abtn.active { background:var(--ink); color:var(--cream); }
        .abtn[data-agent="Avi"].active   { background:var(--lime);     color:var(--ink); border-color:var(--lime-dark); }
        .abtn[data-agent="Tarja"].active { background:var(--lavender); color:var(--ink); border-color:var(--lav-dark); }
        .abtn[data-agent="Mie"].active   { background:var(--peach);    color:var(--ink); border-color:var(--peach-dark); }

        /* IAM BAR */
        .iam-bar { background:#1a1a1a; border-bottom:4px solid var(--ink); display:flex; flex-wrap:wrap; align-items:center; padding:0.6rem 1.5rem; gap:0.5rem; }
        .iam-label { font-size:0.5rem; letter-spacing:0.18em; text-transform:uppercase; color:rgba(255,255,255,0.45); margin-right:0.2rem; }
        .iam-btn { font-family:var(--display); font-size:1.05rem; letter-spacing:0.08em; padding:0.25rem 1rem; border:2.5px solid rgba(255,255,255,0.3); border-radius:40px; cursor:pointer; background:transparent; color:rgba(255,255,255,0.6); transition:all 0.15s; }
        .iam-btn:hover { border-color:white; color:white; }
        .iam-btn.active { background:white; color:var(--ink); border-color:white; }
        .iam-sep { width:1px; height:1.4rem; background:rgba(255,255,255,0.2); margin:0 0.4rem; }
        .absent-btn { font-family:var(--display); font-size:0.95rem; letter-spacing:0.08em; padding:0.25rem 1rem; border:2.5px solid rgba(229,80,80,0.5); border-radius:40px; cursor:pointer; background:transparent; color:rgba(229,80,80,0.75); transition:all 0.15s; display:none; }
        .absent-btn.visible { display:inline-block; }
        .absent-btn.active { background:var(--absent-red); color:white; border-color:var(--absent-red); }
        .iam-hint { font-size:0.48rem; letter-spacing:0.1em; color:rgba(255,255,255,0.3); margin-left:auto; font-style:italic; }

        /* WEEK NAVIGATOR */
        .week-nav { background: var(--peach); border-bottom: 4px solid var(--ink); display: flex; align-items: stretch; height: 64px; }
        .wnav-arrow { flex: 0 0 72px; background: transparent; border: none; border-right: 4px solid var(--ink); font-size: 1.8rem; cursor: pointer; color: var(--ink); transition: background 0.12s; display: flex; align-items: center; justify-content: center; }
        .wnav-arrow:last-child { border-right: none; border-left: 4px solid var(--ink); }
        .wnav-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 0.6rem; }
        .wnav-label { font-family: var(--display); font-size: 1.4rem; letter-spacing: 0.12em; color: var(--ink); opacity: 0.45; }
        .wnav-input { font-family: var(--display); font-size: 2.4rem; color: var(--ink); background: transparent; border: none; border-bottom: 3px solid var(--ink); width: 4rem; text-align: center; outline: none; }
        .wnav-range { font-size: 0.5rem; font-weight: 700; color: var(--ink); opacity: 0.5; text-transform: uppercase; }

        /* GRID */
        #schedules { min-height: 400px; }
        .day-grid { display:grid; grid-template-columns:repeat(5,1fr); border-top:4px solid var(--ink); border-left:4px solid var(--ink); width:100%; }
        .day-col { border-right:4px solid var(--ink); border-bottom:4px solid var(--ink); background:var(--cream); position: relative; }
        .day-col.today { background:#FAF5FF; box-shadow:inset 0 0 0 3px var(--today-glow); z-index:1; }

        .day-header { background:var(--sky); border-bottom:4px solid var(--ink); padding:0.65rem 0.8rem; }
        .day-col.today .day-header { background:var(--today-glow); color: white; }
        .day-name { font-family:var(--display); font-size: 1.2rem; }
        .day-date { font-size:0.5rem; font-weight:700; opacity: 0.6; }

        /* ABSENT STATE */
        .day-col.absent-day { background: var(--absent-bg); }
        .day-col.absent-day .slot { display: none; }
        .absent-overlay { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 0.5rem; text-align: center; }
        .day-col.absent-day .absent-overlay { display: flex; }
        .absent-text { font-family: var(--display); color: var(--absent-red); font-size: 1.2rem; }
        .absent-undo { margin-top: 0.5rem; cursor: pointer; border: 1px solid var(--absent-red); padding: 2px 8px; font-size: 0.5rem; border-radius: 10px; background: white; }

        /* SLOTS */
        .slot { padding:0.55rem 0.75rem; border-bottom:3px solid var(--ink); transition: background 0.2s; position: relative; cursor: default; }
        .slot:last-child { border-bottom:none; }
        .slot-time { font-size:0.7rem; font-weight:700; opacity:0.6; margin-bottom:0.3rem; }
        .agent-tag { font-family:var(--display); font-size: 0.9rem; padding: 2px 6px; border: 2px solid currentColor; margin-right: 4px; border-radius: 3px; display: inline-block; }
        .agent-tag.Avi { color: #2A7A2A; }
        .agent-tag.Tarja { color: #5533AA; }
        .agent-tag.Mie { color: #BB2277; }
        
        .slot.swappable { cursor: pointer; }
        .slot.swappable:hover { background: rgba(123, 79, 212, 0.1); }
        .slot.highlighted { background: var(--hl-bg) !important; }
        .slot.dimmed { opacity: 0.2; }

        /* MODAL */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px); z-index:100; align-items:center; justify-content:center; }
        .modal-overlay.open { display:flex; }
        .modal { background:var(--cream); border:4px solid var(--ink); width:min(400px, 90vw); padding: 1.5rem; box-shadow: 8px 8px 0 var(--ink); }
        .modal-title { font-family: var(--display); font-size: 2rem; margin-bottom: 1rem; }
        .swap-options { display: flex; flex-direction: column; gap: 10px; margin: 1rem 0; }
        .swap-btn { font-family: var(--display); font-size: 1.2rem; padding: 10px; cursor: pointer; border: 3px solid var(--ink); background: white; }
        .swap-btn:hover { background: var(--ink); color: white; }
        .btn-cancel { width: 100%; padding: 10px; border: none; cursor: pointer; margin-top: 10px; }

        /* TOAST */
        .toast { position:fixed; bottom:2rem; left:50%; transform:translateX(-50%); background:var(--ink); color:white; padding:0.8rem 1.5rem; border-radius:40px; font
