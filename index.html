<!DOCTYPE html>
<html lang="da">

    <style>
        :root {
            --ink: #1a1a1a; --cream: #FFF9F2; --lavender: #C8B4E8; --lav-dark: #9B7FCC;

        * { margin:0; padding:0; box-sizing:border-box; }
        body { background:var(--cream); font-family:var(--mono); color: var(--ink); overflow-x:hidden; }

        .masthead { background:var(--lavender); border-bottom:4px solid var(--ink); display:grid; grid-template-columns:1fr auto; }
        .mt { padding:1.2rem; }
        .mt h1 { font-family:var(--display); font-size:clamp(2.5rem, 7vw, 4.5rem); line-height:0.9; }
        .mt h1 span { color: var(--lav-dark); }
        .mt-sub { font-size:0.58rem; letter-spacing:0.15em; text-transform:uppercase; opacity:0.6; margin-top:0.5rem; }
        
        .sync-box { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
        #syncDot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; transition: 0.3s; }

        .controls, .iam-bar { padding: 0.8rem 1.2rem; border-bottom: 4px solid var(--ink); display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .iam-bar { background: #1a1a1a; color: white; }
        
        .abtn, .iam-btn { font-family:var(--display); font-size: 1.1rem; padding: 5px 18px; border: 3px solid var(--ink); border-radius: 40px; cursor: pointer; background: white; color: var(--ink); }
        .iam-btn { background: transparent; color: rgba(255,255,255,0.5); border-color: #444; }
        .iam-btn.active { background: white; color: var(--ink); border-color: white; }
        .abtn.active { background: var(--ink); color: white; }

        .week-nav { background: var(--peach); border-bottom: 4px solid var(--ink); display: flex; align-items: stretch; height: 60px; }
        .wnav-arrow { width: 70px; border: none; border-right: 4px solid var(--ink); background: transparent; font-size: 1.8rem; cursor: pointer; }
        .wnav-arrow:last-child { border-right: none; border-left: 4px solid var(--ink); }
        .wnav-center { flex: 1; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .wnav-input { font-family: var(--display); font-size: 2.2rem; width: 60px; text-align: center; background: transparent; border: none; border-bottom: 3px solid var(--ink); outline: none; pointer-events: none; }

        .hours-bar { background: var(--ink); color: white; padding: 10px 20px; border-bottom: 4px solid var(--ink); display: flex; justify-content: space-around; font-family: var(--display); font-size: 1.2rem; letter-spacing: 0.05em; }
        .hours-bar span { opacity: 0.8; }
        .hours-bar b { color: var(--lime); font-size: 1.4rem; margin-left: 5px; opacity: 1; }

        .day-grid { display: grid; grid-template-columns: repeat(5, 1fr); border-left: 4px solid var(--ink); width: 100%; }
        .day-col { border-right: 4px solid var(--ink); border-bottom: 4px solid var(--ink); background: var(--cream); min-height: 450px; position: relative; }
        .day-header { padding: 12px; border-bottom: 4px solid var(--ink); background: var(--sky); display: flex; flex-direction: column; gap: 5px; }
        .day-col.today { background: #FAF5FF; box-shadow: inset 0 0 0 3px var(--today-glow); z-index: 1; }
        .day-col.today .day-header { background: var(--today-glow); color: white; }
        .day-name { font-family: var(--display); font-size: 1.5rem; letter-spacing: 0.05em; line-height: 1; }
        .day-date { font-size: 0.6rem; font-weight: bold; opacity: 0.7; }

        .day-free-btn { background: white; color: var(--ink); border: 2px solid var(--ink); padding: 4px 8px; font-family: var(--display); font-size: 0.8rem; cursor: pointer; border-radius: 4px; align-self: flex-start; }
        .day-free-btn:hover { background: var(--absent-red); color: white; border-color: var(--absent-red); }

        .slot { padding: 12px; border-bottom: 2px solid rgba(0,0,0,0.05); position: relative; }
        .slot-time { font-size: 0.7rem; font-weight: bold; opacity: 0.5; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .agent-tag { font-family: var(--display); font-size: 1rem; padding: 2px 8px; border: 2px solid currentColor; border-radius: 3px; margin-right: 4px; display: inline-block; margin-bottom: 2px; }
        .agent-tag.Avi { color: #2A7A2A; } .agent-tag.Tarja { color: #5533AA; } .agent-tag.Mie { color: #BB2277; }
        .agent-tag.is-absent { opacity: 0.6; text-decoration: line-through; border-style: dashed; font-size: 0.85rem; }
        
        .changed-badge { background: var(--changed-orange); color: white; font-family: var(--display); font-size: 0.6rem; padding: 2px 6px; border-radius: 10px; opacity: 1 !important; }

        .slot.swappable { cursor: pointer; }
        .slot.swappable:hover { background: rgba(123, 79, 212, 0.1); }
        .slot.highlighted { background: var(--hl-color) !important; }
        .slot.dimmed { opacity: 0.15; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 100; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--cream); border: 4px solid var(--ink); padding: 25px; width: 90%; max-width: 400px; box-shadow: 10px 10px 0 var(--ink); }
        .modal-h2 { font-family: var(--display); font-size: 2rem; margin-bottom: 15px; }
        .swap-btn { width: 100%; padding: 12px; margin-bottom: 10px; border: 3px solid var(--ink); font-family: var(--display); font-size: 1.3rem; cursor: pointer; background: white; }
        .swap-btn:hover { background: var(--ink); color: white; }
        .swap-btn.undo-btn { border-color: var(--absent-red); color: var(--absent-red); margin-top: 15px; }
        .swap-btn.undo-btn:hover { background: var(--absent-red); color: white; }

        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--ink); color: white; padding: 12px 25px; border-radius: 40px; font-size: 0.8rem; display: none; z-index: 1000; }

        @media (max-width: 850px) { .day-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 550px) { .day-grid { grid-template-columns: 1fr; } .hours-bar { flex-direction: column; align-items: center; gap: 5px; } }
    </style>
</head>

    // --- RENDER ---
    function render() {
        const week = WEEKS[activeWeek];
        document.getElementById('weekRange').textContent = week.range;
        document.getElementById('weekInput').value = week.wn;

        let html = `<div class="day-grid">`;
        let hoursCount = { Avi: 0, Tarja: 0, Mie: 0 };

        week.days.forEach((day, di) => {
            // Find who is marked absent on this specific day
            let absentAgents = [];
            ['Avi', 'Tarja', 'Mie'].forEach(a => {
                if (fbChanges[`abs_${activeWeek}_${di}_${a}`]) absentAgents.push(a);
            });
            
            html += `<div class="day-col ${day.isToday ? 'today' : ''}">
                <div class="day-header">
                    <div>
                        <div class="day-name">${day.name}</div>
                        <div class="day-date">${day.date}</div>
                    </div>`;
            
            // Show "Meld mig fri" button if logged in and not already absent
            if (iamAgent && !absentAgents.includes(iamAgent)) {
                html += `<button class="day-free-btn" onclick="window.toggleAbsent(${di}, false)">MELD MIG FRI</button>`;
            }
            html += `</div>`;
            
            // Undo banner if the logged in agent IS absent today
            if (iamAgent && absentAgents.includes(iamAgent)) {
                html += `<div style="background:var(--absent-red); color:white; font-family:var(--display); font-size:0.8rem; text-align:center; padding:5px; cursor:pointer;" onclick="window.toggleAbsent(${di}, true)">IKKE TIL STEDE - FORTRYD</div>`;
            }

            day.slots.forEach((slot, si) => {
                const swapKey = `swap_${activeWeek}_${di}_${si}`;
                const swapData = fbChanges[swapKey];
                const currentAgents = (swapData && swapData.agents) ? swapData.agents : slot.agents;
                
                const [start, end] = slot.time.split('-');
                const [sH, sM] = start.split(':').map(Number);
                const [eH, eM] = end.split(':').map(Number);
                const duration = (eH + eM/60) - (sH + sM/60);

                currentAgents.forEach(a => {
                    if (!absentAgents.includes(a)) hoursCount[a] += duration;
                });

                // Is swappable if I am currently scheduled, OR if I was originally scheduled and someone else has it now (so I can undo it)
                const isSwappable = iamAgent && (currentAgents.includes(iamAgent) || (swapData && slot.agents.includes(iamAgent)));
                
                const isHl = filterAgent && currentAgents.includes(filterAgent);
                const isDim = filterAgent && !currentAgents.includes(filterAgent);

                html += `<div class="slot ${isHl ? 'highlighted' : ''} ${isDim ? 'dimmed' : ''} ${isSwappable ? 'swappable' : ''}" 
                             style="${isHl ? '--hl-color:' + COLORS[filterAgent] : ''}"
                             onclick="window.handleSlotClick(${di}, ${si})">
                    <div class="slot-time">
                        ${slot.time}
                        ${swapData ? `<span class="changed-badge">ÆNDRET</span>` : ''}
                    </div>
                    <div>${currentAgents.map(a => {
                        const isThisAgentAbsent = absentAgents.includes(a);
                        return `<span class="agent-tag ${a} ${isThisAgentAbsent ? 'is-absent' : ''}">${isThisAgentAbsent ? `${a}-ikke til stede` : a}</span>`;
                    }).join('')}</div>
                </div>`;
            });
            html += `</div>`;
        });
        
        document.getElementById('scheduleOutput').innerHTML = html + `</div>`;

        document.getElementById('hoursBar').innerHTML = 
            `<span>AVI: <b>${hoursCount.Avi.toFixed(1)}t</b></span>` +
            `<span>TARJA: <b>${hoursCount.Tarja.toFixed(1)}t</b></span>` +
            `<span>MIE: <b>${hoursCount.Mie.toFixed(1)}t</b></span>`;
    }

    // --- LOGIC ---
    window.handleSlotClick = (di, si) => {
        if (!iamAgent) return;
        const week = WEEKS[activeWeek];
        const slot = week.days[di].slots[si];
        
        const swapKey = `swap_${activeWeek}_${di}_${si}`;
        const swapData = fbChanges[swapKey];
        const currentAgents = (swapData && swapData.agents) ? swapData.agents : slot.agents;
        
        const canGiveAway = currentAgents.includes(iamAgent);
        const canUndo = swapData && slot.agents.includes(iamAgent); // Only originally scheduled agents can undo a shift change

        if (!canGiveAway && !canUndo) return;

        const modal = document.getElementById('swapModal');
        const opts = document.getElementById('swapOptions');
        document.getElementById('swapInfo').textContent = `${slot.time} - Hvad vil du gøre?`;
        opts.innerHTML = '';

        if (canGiveAway) {
            ['Avi', 'Tarja', 'Mie'].filter(a => a !== iamAgent && !currentAgents.includes(a)).forEach(other => {
                const btn = document.createElement('button');
                btn.className = 'swap-btn';
                btn.textContent = `GIV VAGT TIL ${other.toUpperCase()}`;
                btn.onclick = async () => {
                    const newA = currentAgents.map(a => a === iamAgent ? other : a);
                    await setDoc(doc(db, 'vagtplan', 'changes'), { [swapKey]: { agents: newA, ts: Date.now() } }, { merge: true });
                    modal.classList.remove('open');
                    toast("Vagt byttet!");
                };
                opts.appendChild(btn);
            });
        }

        if (canUndo) {
            const btn = document.createElement('button');
            btn.className = 'swap-btn undo-btn';
            btn.textContent = `FORTRYD ÆNDRING (GENDAN)`;
            btn.onclick = async () => {
                await setDoc(doc(db, 'vagtplan', 'changes'), { [swapKey]: deleteField() }, { merge: true });
                modal.classList.remove('open');
                toast("Ændring fortrudt!");
            };
            opts.appendChild(btn);
        }

        modal.classList.add('open');
    };

    window.toggleAbsent = async (di, remove = false) => {
        if (!iamAgent) return;
        const key = `abs_${activeWeek}_${di}_${iamAgent}`;
        const data = { [key]: remove ? deleteField() : true };
        await setDoc(doc(db, 'vagtplan', 'changes'), data, { merge: true });
        toast(remove ? "Markering fjernet" : "Markeret som fraværende");
    };

    function toast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    // --- LISTENERS ---
    onSnapshot(doc(db, 'vagtplan', 'changes'), (snap) => {
        document.getElementById('syncDot').style.background = '#4CAF50';
        document.getElementById('syncStatus').textContent = 'LIVE';
        if (snap.exists()) fbChanges = snap.data();
        render();
    });

    document.querySelectorAll('.abtn').forEach(b => b.onclick = () => {
        document.querySelectorAll('.abtn').forEach(x => x.classList.remove('active'));
        b.classList.add('active'); filterAgent = b.dataset.filter; render();
    });

    document.querySelectorAll('.iam-btn').forEach(b => b.onclick = () => {
        if (iamAgent === b.dataset.iam) {
            iamAgent = ''; b.classList.remove('active');
        } else {
            document.querySelectorAll('.iam-btn').forEach(x => x.classList.remove('active'));
            iamAgent = b.dataset.iam; b.classList.add('active');
        }
        render();
    });

    document.getElementById('prevWeek').onclick = () => { if(activeWeek > 0) { activeWeek--; render(); } };
    document.getElementById('nextWeek').onclick = () => { if(activeWeek < WEEKS.length-1) { activeWeek++; render(); } };

    render(); // Initial draw
</script>

</body>
</html>
